# ── Shared ───────────────────────────────────────────────────────────────────
env:
  seed: 42                 # DTSP instance seed (env randomness)

# ── Genetic Algorithm ─────────────────────────────────────────────────────────
ga:
  pop_sizes:   [100, 200, 400]   # E1 grid search
  mutation_rates: [0.05, 0.1, 0.2]
  n_generations: 5000            # E1 budget
  tournament_k: 3

# ── Neuroevolution ────────────────────────────────────────────────────────────
neuroevolution:
  pop_size: 50
  sigma: 0.05
  n_generations: 500
  elite_frac: 0.2
  tournament_k: 3
  crossover: true
  val_every: 10
  seeds: [1, 2, 3]         # E2 independent runs
  hidden_dim: 128

# ── Experiment-specific ───────────────────────────────────────────────────────
e1:
  n_cities: 30

e2:
  n_cities: 30

e3:
  sizes: [10, 20, 30, 50]
  ga_n_generations: 3000   # fixed budget for scaling experiment
  ne_n_generations: 300

e4:
  n_cities: 30
  ga_n_generations: 10000
  ne_n_generations: 500

# ── Wandb ─────────────────────────────────────────────────────────────────────
wandb:
  project: "aci-dtsp"
  mode: "online"            # set to "disabled" to skip wandb entirely
